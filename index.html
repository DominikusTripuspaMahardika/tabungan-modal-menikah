<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabungan Modal Menikah</title>
    <link rel="manifest" href="data/manifest.json">
    <meta name="theme-color" content="#ffffff">
    <link rel="icon" href="images/icon-192x192.png" sizes="192x192">
    <link rel="icon" href="images/icon-512x512.png" sizes="512x512">
    <link rel="shortcut icon" href="favicon/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="assets/index.css">
</head>
<body>
    <!-- Modal PWA -->
    <div id="installModal" class="modal">
        <div class="modal-content">
            <h2>Pasang Aplikasi</h2>
            <p>Pasang aplikasi ini di perangkat Anda untuk pengalaman yang lebih baik.</p>
            <div class="modal-buttons">
                <button id="installBtn">Pasang Sekarang</button>
                <button id="laterBtn">Nanti Saja</button>
                <button id="dontShowAgainBtn">Jangan Tampilkan Lagi</button>
            </div>
        </div>
    </div>

    <div class="container">
        <header>
            <h1>Tabungan Modal Menikah</h1>
        </header>

        <!-- Filter Section -->
        <div class="filter-section card">
            <label for="filterBulan">Bulan:</label>
            <select id="filterBulan">
                <option value="">Semua</option>
                <option value="01">Januari</option>
                <option value="02">Februari</option>
                <option value="03">Maret</option>
                <option value="04">April</option>
                <option value="05">Mei</option>
                <option value="06">Juni</option>
                <option value="07">Juli</option>
                <option value="08">Agustus</option>
                <option value="09">September</option>
                <option value="10">Oktober</option>
                <option value="11">November</option>
                <option value="12">Desember</option>
            </select>

            <label for="filterTahun">Tahun:</label>
            <input type="number" id="filterTahun" placeholder="2025">

            <label for="searchTanggal">Cari Tanggal:</label>
            <input type="date" id="searchTanggal">
        </div>

        <div class="garis-pembatas"></div>

        <!-- Form Input -->
        <main>
            <form id="tabunganForm" class="card">
                <label for="tanggal">Tanggal</label>
                <input type="date" id="tanggal" required>
                <label for="tabunganPria">Tabungan Pria</label>
                <input type="number" id="tabunganPria" placeholder="Masukkan tabungan pria" required>
                <label for="tabunganWanita">Tabungan Wanita</label>
                <input type="number" id="tabunganWanita" placeholder="Masukkan tabungan wanita" required>
                <button type="submit">Simpan</button>
            </form>

            <!-- Daftar Tabungan -->
            <section id="tabunganList" class="card">
                <h2>Daftar Tabungan</h2>
                <div class="table-wrapper">
                    <table id="tabunganTable">
                        <thead>
                            <tr>
                                <th>Tanggal</th>
                                <th>Tabungan Pria</th>
                                <th>Tabungan Wanita</th>
                                <th>Total</th>
                                <th>Aksi</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>

                <!-- Progress -->
                <div class="progress-section">
                    <h3 style="margin-bottom: 10px;">Progres Target Tabungan</h3>
                    <div class="progress-bar">
                        <div id="progressFill"></div>
                    </div>
                    <p id="progressText" style="margin-top: 10px;">0%</p>
                    <p id="estimasiWaktu"></p>
                </div>
            </section>
        </main>
    </div>

    <script src="assets/index.js" defer></script>
</body>
</html>
